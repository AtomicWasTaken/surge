name: Release Backfill Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to backfill (for example v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  backfill-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Checkout release tag
        run: git checkout "${{ inputs.tag }}"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build release artifacts (no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "checksums.txt" \) | sort)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No archive assets found in dist/"
            exit 1
          fi
          gh release upload "${{ inputs.tag }}" "${assets[@]}" --clobber
